<!DOCTYPE html>
<html lang=en>
<head>
<meta charset=utf-8>
<title>Formal Sciences Bibliographer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e6e6e6; height: 100vh; display: flex; flex-direction: column; }
header { background: #1a1a2e; border-bottom: 1px solid #2a2a4a; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
header h1 { font-size: 1.1rem; color: #a78bfa; font-weight: 600; }
.api-key-row { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.api-key-row label { font-size: 0.8rem; color: #888; }
.api-key-row input { background: #16162a; border: 1px solid #2a2a4a; border-radius: 6px; padding: 6px 10px; color: #e6e6e6; font-size: 0.85rem; width: 280px; }
.api-key-row button { background: #7c3aed; border: none; border-radius: 6px; padding: 6px 14px; color: white; font-size: 0.85rem; cursor: pointer; }
.api-key-row button:hover { background: #6d28d9; }
.load-row { padding: 10px 20px; background: #16162a; border-bottom: 1px solid #2a2a4a; display: flex; align-items: center; gap: 10px; }
.load-row label { font-size: 0.8rem; color: #888; }
.load-row input[type=file] { display: none; }
.load-row .btn { background: #2a2a4a; border: 1px solid #3a3a5a; border-radius: 6px; padding: 5px 12px; color: #ccc; font-size: 0.8rem; cursor: pointer; }
.load-row .btn:hover { background: #3a3a5a; }
.load-row .status { font-size: 0.75rem; color: #6b7280; margin-left: 8px; }
.main { display: flex; flex: 1; overflow: hidden; }
.panes { display: flex; flex: 1; overflow: hidden; }
.pane { overflow-y: auto; border-right: 1px solid #2a2a4a; }
#taxonomy-pane { width: 420px; min-width: 300px; }
#selected-pane { flex: 1; min-width: 300px; }
.pane-header { background: #1a1a2e; padding: 8px 14px; font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; position: sticky; top: 0; z-index: 1; border-bottom: 1px solid #2a2a4a; }
.pane-content { padding: 8px; }
.tree-item { padding: 5px 8px; border-radius: 4px; cursor: pointer; font-size: 0.875rem; }
.tree-item:hover { background: #1e1e32; }
.tree-item.selected { background: #3b2f6b; color: #c4b5fd; }
.tree-item .code { color: #6b7280; font-size: 0.75rem; margin-right: 6px; font-family: monospace; }
.tree-children { padding-left: 16px; }
.tree-branch > .tree-item .toggle { display: inline-block; width: 14px; font-size: 0.65rem; color: #555; margin-right: 2px; }
.hidden { display: none; }
#selected-info { padding: 14px; }
#selected-info h2 { font-size: 1rem; color: #c4b5fd; margin-bottom: 4px; }
#selected-info .code-tag { font-size: 0.75rem; background: #2a2a4a; color: #888; padding: 2px 8px; border-radius: 4px; font-family: monospace; margin-bottom: 12px; display: inline-block; }
#selected-info button { background: #7c3aed; border: none; border-radius: 6px; padding: 8px 18px; color: white; font-size: 0.85rem; cursor: pointer; margin-bottom: 16px; }
#selected-info button:hover { background: #6d28d9; }
#selected-info button:disabled { background: #3a2a6a; color: #666; cursor: not-allowed; }
#bib-output { margin-top: 10px; }
.bib-entry { background: #16162a; border: 1px solid #2a2a4a; border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; font-size: 0.85rem; line-height: 1.5; }
.bib-entry .bib-type { font-size: 0.65rem; color: #a78bfa; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
.bib-entry .bib-title { color: #e0d8ff; font-weight: 500; }
.bib-entry .bib-authors { color: #888; font-size: 0.8rem; margin-top: 2px; }
.bib-entry .bib-meta { color: #555; font-size: 0.75rem; margin-top: 2px; }
.bib-entry .bib-abstract { color: #6b7280; font-size: 0.78rem; margin-top: 6px; font-style: italic; }
.loading { text-align: center; padding: 30px; color: #888; }
.loading::after { content: '...'; animation: dots 1.5s infinite; }
@keyframes dots { 0%,20%{content:'.'} 40%{content:'..'} 60%,100%{content:'...'} }
.error { background: #2a1a1a; border: 1px solid #5a2a2a; border-radius: 8px; padding: 12px; color: #f87171; font-size: 0.85rem; margin-top: 10px; }
.empty-state { padding: 30px; text-align: center; color: #555; font-size: 0.85rem; }
</style>
</head>
<body>

<header>
  <h1>Formal Sciences Bibliographer</h1>
  <div class=api-key-row>
    <label>OpenRouter API Key:</label>
    <input type=password id=apiKey placeholder='sk-or-v1-...' />
    <button onclick='saveKey()'>Save</button>
  </div>
</header>

<div class=load-row>
  <label>Load MSC data:</label>
  <label class=btn>Choose msc_complete.js
    <input type=file accept='.js,.json' onchange='loadMSC(this)' />
  </label>
  <span class=status id=loadStatus>No file loaded. Paste your msc_complete.js to use this app.</span>
</div>

<div class=main>
  <div class=panes>
    <div class=pane id=taxonomy-pane>
      <div class=pane-header>Taxonomy — 00–97 MSC Codes</div>
      <div class=pane-content id=taxonomy-tree></div>
    </div>
    <div class=pane id=selected-pane>
      <div class=pane-header>Bibliography Generator</div>
      <div id=selected-info>
        <div class=empty-state>Select any topic from the taxonomy to generate a seminal bibliography.</div>
      </div>
    </div>
  </div>
</div>

<script>
// State
let taxonomyData = null;
let selectedItem = null;
let apiKey = localStorage.getItem('openrouter_key') || '';

// Init
if (apiKey) document.getElementById('apiKey').value = apiKey;

function saveKey() {
  apiKey = document.getElementById('apiKey').value.trim();
  localStorage.setItem('openrouter_key', apiKey);
}

// Load MSC file
function loadMSC(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      let text = e.target.result;
      // Strip const assignment if present
      text = text.replace(/^const \uD83C\uDD99_FULL = /, '').replace(/;?\n?$/, '');
      taxonomyData = JSON.parse(text);
      document.getElementById('loadStatus').textContent = 'Loaded ' + taxonomyData.length + ' top-level MSC sections.';
      document.getElementById('loadStatus').style.color = '#4ade80';
      renderTaxonomy();
    } catch(err) {
      document.getElementById('loadStatus').textContent = 'Error: ' + err.message;
      document.getElementById('loadStatus').style.color = '#f87171';
    }
  };
  reader.readAsText(file);
}

// Render taxonomy tree
function renderTaxonomy() {
  if (!taxonomyData) return;
  const tree = document.getElementById('taxonomy-tree');
  tree.innerHTML = '';
  taxonomyData.forEach(section => {
    const branch = document.createElement('div');
    branch.className = 'tree-branch';
    const item = document.createElement('div');
    item.className = 'tree-item';
    item.dataset.code = section.code;
    item.innerHTML = '<span class=toggle onclick=\"toggle(event,\this)\">&#9656;</span><span class=code>' + section.code + '</span>' + section.name;
    item.onclick = (e) => { if (e.target.className !== 'toggle') selectItem(section, item); };
    branch.appendChild(item);
    const children = document.createElement('div');
    children.className = 'tree-children hidden';
    renderSubs(children, section.subs || []);
    branch.appendChild(children);
    tree.appendChild(branch);
  });
}

function renderSubs(container, subs) {
  subs.forEach(sub => {
    const branch = document.createElement('div');
    branch.className = 'tree-branch';
    const item = document.createElement('div');
    item.className = 'tree-item';
    item.dataset.code = sub.code;
    const hasChildren = sub.subs && sub.subs.length > 0;
    item.innerHTML = hasChildren
      ? '<span class=toggle onclick=\"toggle(event,this)\">&#9656;</span><span class=code>' + sub.code + '</span>' + sub.name
      : '<span class=code>' + sub.code + '</span>' + sub.name;
    item.onclick = (e) => { if (e.target.className !== 'toggle') selectItem(sub, item); };
    branch.appendChild(item);
    if (hasChildren) {
      const children = document.createElement('div');
      children.className = 'tree-children hidden';
      renderSubs(children, sub.subs);
      branch.appendChild(children);
    }
    container.appendChild(branch);
  });
}

function toggle(e, el) {
  e.stopPropagation();
  const children = el.parentElement.querySelector('.tree-children');
  if (children) {
    children.classList.toggle('hidden');
    el.innerHTML = children.classList.contains('hidden') ? '&#9656;' : '&#9662;';
  }
}

function selectItem(item, el) {
  document.querySelectorAll('.tree-item.selected').forEach(x => x.classList.remove('selected'));
  el.classList.add('selected');
  selectedItem = item;
  renderSelected();
}

function renderSelected() {
  const info = document.getElementById('selected-info');
  if (!selectedItem) {
    info.innerHTML = '<div class=empty-state>Select any topic from the taxonomy to generate a seminal bibliography.</div>';
    return;
  }
  info.innerHTML = `
    <h2>${selectedItem.name}</h2>
    <span class=code-tag>${selectedItem.code}</span>
    <br>
    <button onclick='generateBib()' id=genBtn>Generate Bibliography</button>
    <div id=bib-output></div>
  `;
}

// Generate bibliography via OpenRouter
async function generateBib() {
  const btn = document.getElementById('genBtn');
  const output = document.getElementById('bib-output');
  if (!apiKey) { alert('Please enter your OpenRouter API key first.'); return; }
  if (!selectedItem) return;

  btn.disabled = true;
  output.innerHTML = '<div class=loading>Generating bibliography</div>';

  const prompt = `You are a professional librarian specializing in mathematics and formal sciences.

Generate a seminal bibliography for the MSC classification:

**Code:** ${selectedItem.code}
**Topic:** ${selectedItem.name}

Return a JSON array of exactly 8 references. Each entry must be a real, verifiable publication (papers, books, or monographs) that experts consider foundational or landmark works in this specific area. Include ONLY real publications with accurate metadata.

Return this exact JSON format (no markdown, no extra text):
[
  {
    \"type\": \"paper|book|monograph\",
    \"title\": \"Exact title of the work\",
    \"authors\": \"Author1, Author2, Author3\",
    \"year\": 20XX,
    \"publisher_journal\": \"Publisher name or journal name + volume/pages\",
    \"why_seminal\": \"One sentence explaining why this is a landmark contribution.\"
  }
]

Focus on the most foundational works — the papers/books that defined the field or introduced key techniques. Prioritize works from 1950–2025. Include a mix of classical foundational works and modern influential papers.`;

  try {
    const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + apiKey,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: 'google/gemini-3-flash-preview',
        messages: [{ role: 'user', content: prompt }],
        temperature: 0.7
      })
    });

    if (!response.ok) {
      const err = await response.text();
      throw new Error('API error ' + response.status + ': ' + err);
    }

    const data = await response.json();
    let content = data.choices?.[0]?.message?.content || '';

    // Strip markdown code blocks
    content = content.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
    const refs = JSON.parse(content);

    output.innerHTML = '';
    refs.forEach(ref => {
      const div = document.createElement('div');
      div.className = 'bib-entry';
      div.innerHTML = `
        <div class=bib-type>${ref.type || 'paper'}</div>
        <div class=bib-title>${ref.title}</div>
        <div class=bib-authors>${ref.authors} (${ref.year})</div>
        <div class=bib-meta>${ref.publisher_journal || ''}</div>
        <div class=bib-abstract>${ref.why_seminal || ''}</div>
      `;
      output.appendChild(div);
    });
  } catch(err) {
    output.innerHTML = '<div class=error>Error: ' + err.message + '</div>';
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
